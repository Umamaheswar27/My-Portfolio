server {
    listen 80;
    server_name localhost;

    # Root directory where React build assets are served from
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────
    # React SPA Routing
    # Without this, refreshing on any route like
    # /#about would return 404 from Nginx.
    # try_files checks for the file, then falls
    # back to index.html so React handles routing.
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────
    # Static Asset Caching
    # Cache JS, CSS, images aggressively since
    # CRA adds content hashes to filenames.
    # ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Disable Nginx version in error pages
    server_tokens off;

    # Gzip compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
